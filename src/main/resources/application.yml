server:
  port: 9000

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          secret: mySuperSecretKeyForJwtGenerationThatIsAtLeast32CharactersLong!

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:9000
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        - id: posts-services
          uri: https://jsonplaceholder.typicode.com
          predicates:
            - Path=/api/posts/**
          filters:
            - RewritePath=/api/posts(?<segment>/?.*), /posts/$\{segment}
            - name: CircuitBreaker
              args:
                name: externalService
                fallbackUri: forward:/fallback/external

        - id: users-services
          uri: https://jsonplaceholder.typicode.com
          predicates:
            - Path=/api/users/**
            - Method=GET
          filters:
            - RewritePath=/api/users(?<segment>/?.*), /users/$\{segment}
            - name: CircuitBreaker
              args:
                name: externalService
                fallbackUri: forward:/fallback/external

        - id: external-fallback
          uri: forward:/fallback/external
          predicates:
            - Path=/fallback/external/**
          filters:
            - SetStatus=503
            - AddResponseHeader=X-Fallback, "true"

      globalcors:
        cors-configurations:
          '[/api/**]':
            allowed-origins:
              - "http://localhost:9000"
            allowed-methods:
              - GET
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

jwt:
  secret: mySuperSecretKeyForJwtGenerationThatIsAtLeast32CharactersLong!
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
  server:
    port: 9000
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    com.nurtricenter.apigateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG