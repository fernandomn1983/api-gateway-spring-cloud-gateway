server:
  port: 9000

security:
  cors-allowed-origins:
    - "http://localhost:9000"
    - "https://127.0.0.1:3000"
  public-list:
    - "/auth/**"
    - "/public/**"
    - "/actuator/health"
    - "/actuator/info"
    - "/fallback/**"

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          secret: mySuperSecretKeyForJwtGenerationThatIsAtLeast32CharactersLong!
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:9000
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        - id: contract-services
          uri: http://localhost:8440
          predicates:
            - Path=/api/contracts, /api/contracts/**
          filters:
            - RewritePath=/api/contracts/?(?<segment>.*), /v1/contract-services/contracts/$\{segment}
            - name: CircuitBreaker
              args:
                name: contractService
                fallbackUri: forward:/fallback/contracts
            - name: PreserveHostHeader
              args:
                enabled: false

        - id: contracts-fallback
          uri: forward:/fallback/contracts
          predicates:
            - Path=/fallback/contracts/**
          filters:
            - SetStatus=503
            - AddResponseHeader=X-Fallback, "true"
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

jwt:
  secret: mySuperSecretKeyForJwtGenerationThatIsAtLeast32CharactersLong!
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
  server:
    port: 9000
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.nurtricenter.apigateway: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
    org.springframework.http.server.reactive: INFO