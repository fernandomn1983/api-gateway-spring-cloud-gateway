server:
  port: ${SERVER_PORT:9000}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/

logging:
  level:
    com.nurtricenter.apigateway: ${LOGGING_LEVEL_COM_NURTRICENTER_APIGATEWAY:INFO}